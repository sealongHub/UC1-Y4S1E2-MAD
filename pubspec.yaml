name: mad
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  path: ^1.9.1
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  get: ^4.7.3
  badges: ^3.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Hanuman
      fonts:
        - asset: assets/fonts/Hanuman-VariableFont_wght.ttf
    - family: NotoSansKhmer
      fonts:
        - asset: assets/fonts/NotoSansKhmer-VariableFont_wdth.ttf
    - family: KantumruyPro
      fonts:
        - asset: assets/fonts/KantumruyPro-VariableFont_wght.ttf